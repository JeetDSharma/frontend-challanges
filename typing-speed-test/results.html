<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="resultHeader">
        <h2>Typing Speed Test</h2>
    </div>
    <div class="reusltSection">
        <h3>Test Complete!</h3>
        <p>You did it!</p>

        <div class="scoreCard">
            <div class="scoreCardItem" >Raw WPM: <span class="wpmResult" id="wpmResult">0</span></div>
            <div class="scoreCardItem" >Net WPM: <span class="wpmResult" id="wpmResult">0</span></div>
            <div class="scoreCardItem" >Accuracy: <span class="accurayResult" id="accurayResult">0</span></div>
            <div class="scoreCardItem" >Time: <span class="timeResult" id="timeResult">0</span></div>
        </div>
    </div>
</body>
</html>
