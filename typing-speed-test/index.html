<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Typing Speed Test</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" href="./style.css">
  <script src="index.js"></script>
</head>
<body onkeydown="checkKeyPress(event)">
  
  <div class="container">
    <div class="header">

      <h3>Typing Speed Test</h3>
      <p>Personal Best: 72 WPM</p>
    </div>
    <div class="stat_header">
      <div class="stat">
        <p>WPM: <span>0</span></p>
        <p>Accuracy: <span>0%</span></p>
        <p>Time: <span id="time">00:00</span></p>
      </div>
      <div class="difficulty" onchange="initializeTypingTest()">
        <label>
          <input type="radio" name="difficulty" value="easy"/>
          <span>Easy</span>
        </label>
        <label>
          <input type="radio" name="difficulty" value="medium"/ checked>
          <span>Medium</span>
        </label>
        <label>
          <input type="radio" name="difficulty" value="hard"/>
          <span>Hard</span>
        </label>
      </div>
      <div class="mode">
        <label>
          <input type="radio" name="mode" value="timed" checked>
          <span>Timed (60s)</span>
        </label>
        <label>
          <input type="radio" name="mode" value="passage">
          <span id="passage">Passage</span>
        </label>
      </div>
    </div>
    <div class="typing_test_section">
      <span class="typing_test" id="typing_test_span"></span>
    </div>
    <div class="restart_btn" onclick="initializeTypingTest()">
      <button >Restart Test</button>
      <img src="./assets/images/icon-restart.svg" alt="restart">
    </div>
  </div>

</body>
</html>
